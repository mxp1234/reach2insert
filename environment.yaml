name: dp-serl
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # ============================================
  # 基础 (经过验证的配置)
  # ============================================
  - python=3.11
  - pip>=23.0

  # ============================================
  # CUDA 工具包
  # 注意: JAX 0.7.1 需要 cuDNN 9.8+
  # ============================================
  - cudatoolkit=12.4
  - cudnn>=9.2

  # ============================================
  # 科学计算 (NumPy 2.x for JAX 0.7.1)
  # ============================================
  - numpy>=2.0
  - scipy>=1.11
  - matplotlib>=3.6

  # ============================================
  # 图像处理
  # ============================================
  - opencv>=4.6
  - imageio>=2.22

  # ============================================
  # 工具
  # ============================================
  - tqdm>=4.64
  - pyyaml>=6.0
  - h5py>=3.7
  - zarr>=2.12

  # ============================================
  # Pip 安装 (使用经过验证的版本)
  # ============================================
  - pip:
    # ========== PyTorch (CUDA 12.1) ==========
    # 使用官方 cu121 wheel
    - torch>=2.2.0
    - torchvision>=0.17.0

    # ========== JAX 0.7.x (需要 NumPy 2.x) ==========
    - jax[cuda12]>=0.7.0
    - flax>=0.8.0
    - orbax-checkpoint>=0.5.0
    - optax>=0.1.5
    - chex>=0.1.85
    - distrax>=0.1.2

    # ========== Diffusers (需要 0.30+ 兼容 JAX 0.7.x) ==========
    - diffusers>=0.30.0
    - huggingface_hub>=0.25.0
    - accelerate>=0.20.0

    # ========== Hydra (DP 配置系统) ==========
    - hydra-core>=1.2.0
    - omegaconf>=2.2.0

    # ========== TensorFlow (SERL 依赖) ==========
    - tensorflow>=2.15.0
    - tensorflow_probability>=0.23.0
    - tf-keras

    # ========== Gym/Gymnasium ==========
    - gym>=0.26.0
    - gymnasium>=0.29.0

    # ========== 机器人接口 ==========
    - pyrealsense2>=2.51.0
    - pynput>=1.7.6
    - pyspacemouse>=1.0.0
    - requests>=2.28.0

    # ========== HIL-SERL ==========
    - agentlace>=0.1.3
    - ml_collections>=0.1.0
    - moviepy>=1.0.3

    # ========== 其他 ==========
    - dill>=0.3.5
    - einops>=0.6
    - absl-py>=2.0
    - cloudpickle>=3.0
    - wandb>=0.13
    - tensorboard>=2.10
    - natsort>=8.0
